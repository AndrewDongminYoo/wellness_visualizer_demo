name: wellness_visualizer_demo
description: Audio-reactive visualizers for a premium music & wellness app (Upwork demo).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # SoLoud gives us realtime FFT/waveform data from the *playing* track,
  # which just_audio does not expose. Visualization is its core use case.
  flutter_soloud: ^4.0.12

dev_dependencies:
  import_sorter: ^4.6.0

flutter:
  uses-material-design: true
  shaders:
    - shaders/aurora.frag
  assets:
    - assets/audio/
    - assets/images/

scripts: merry.yaml
