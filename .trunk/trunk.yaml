# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - java@13.0.11
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - taplo
    - bandit
    - dart
  enabled:
    - swiftformat@0.61.0
    - cspell@10.0.0
    - black@26.3.1
    - isort@8.0.1
    - ruff@0.15.12
    - actionlint@1.7.12
    - checkov@3.2.526
    - git-diff-check
    - ktlint@1.8.0
    - markdownlint@0.48.0
    - osv-scanner@2.3.5
    - oxipng@10.1.1
    - prettier@3.8.3
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.1
    - trufflehog@3.95.2
    - yamllint@1.38.0
  ignore:
    - linters: [osv-scanner]
      paths:
        # https://google.github.io/osv-scanner/supported-languages-and-lockfiles
        - ios/Podfile.lock
        - macos/Podfile.lock
        # fastlane depends on faraday ~> 1.0, cannot upgrade to 2.x
        # https://vulners.com/github/GHSA-33MH-2634-FWR2
        # https://github.com/fastlane/fastlane/issues/29874
        - android/Gemfile.lock
        - ios/Gemfile.lock
    - linters: [swiftformat]
      paths:
        # Generated file. Do not edit.
        - macos/Flutter/GeneratedPluginRegistrant.swift
    - linters: [markdownlint]
      paths: ["**/fastlane/README.md", docs/plans/*.md]
    - linters: [prettier]
      # The Lottie JSON file size increases by approximately 1.3 times when formatting with Prettier.
      paths: [assets/**/*.json]
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
